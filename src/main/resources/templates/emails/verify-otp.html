<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác thực tài khoản</title>
</head>

<body style="font-family: Arial, sans-serif; background:#f4f6f8; padding:20px;">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center">

            <table width="600" style="background:white;border-radius:8px;padding:30px">

                <tr>
                    <td align="center">
                        <h2 style="color:#333" th:text="${appName}">LMS System</h2>
                    </td>
                </tr>

                <tr>
                    <td>
                        <p>Xin chào!</p>

                        <p>Bạn đang thực hiện xác thực tài khoản.</p>

                        <p>Mã OTP của bạn là:</p>

                        <div style="text-align:center;margin:30px 0;">
                            <span style="font-size:32px;font-weight:bold;letter-spacing:5px;color:#4CAF50"
                                  th:text="${otpCode}">
                            </span>
                        </div>

                        <p>Mã có hiệu lực trong
                            <strong th:text="${expirationMinutes}"></strong> phút.</p>

                        <p>Nếu bạn không yêu cầu mã này, hãy bỏ qua email.</p>

                        <br>

                        <p>Trân trọng,<br>
                            <strong th:text="${appName}"></strong></p>

                    </td>
                </tr>

                <tr>
                    <td style="text-align:center;font-size:12px;color:#999;padding-top:20px">
                        © 2026 LMS System
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
