validation.email.notBlank = Email không được để trống
validation.email.invalid = Email không hợp lệ
validation.password.notBlank = Mật khẩu không được để trống
validation.password.size = Mật khẩu phải có ít nhất 8 ký tự
validation.password.pattern = Mật khẩu phải chứa ít nhất một chữ cái viết hoa, một chữ cái viết thường, một số và một ký tự đặc biệt
validation.confirmPassword.notBlank = Xác nhận mật khẩu không được để trống
validation.confirmPassword.match = Xác nhận mật khẩu phải khớp với mật khẩu
validation.name.notBlank = Tên không được để trống
validation.name.size = Tên phải có ít nhất 2 ký tự
validation.role.notBlank = Vai trò không được để trống
validation.role.invalid = Vai trò không hợp lệ
validation.otp.notBlank = OTP không được để trống
validation.otp.size = OTP phải có 6 chữ số
validation.otp.pattern = OTP phải chỉ chứa chữ số
validation.refreshToken.notBlank = Refresh token không được để trống
validation.refreshToken.invalid = Refresh token không hợp lệ

# Authentication Messages
auth.register.success = Đăng ký thành công. Vui lòng kiểm tra email của bạn để lấy OTP.
auth.register.emailExists = Email đã được đăng ký
auth.register.roleNotFound = Vai trò được chọn không hợp lệ
auth.login.success = Đăng nhập thành công
auth.login.emailNotFound = Người dùng không tồn tại
auth.login.invalidCredentials = Email hoặc mật khẩu không hợp lệ
auth.login.notVerified = Tài khoản chưa được xác thực. Vui lòng xác thực email trước.
auth.login.inactive = Tài khoản đã bị vô hiệu hóa
auth.logout.success = Đăng xuất thành công
auth.refresh.success = Token đã được làm mới
auth.refresh.invalid = Refresh token không hợp lệ
auth.refresh.accountInactive = Tài khoản không hoạt động
auth.verifyOtp.success = Tài khoản đã được xác thực thành công
auth.verifyOtp.invalid = OTP không hợp lệ
auth.forgotPassword.success = OTP reset mật khẩu đã được gửi đến email của bạn
auth.forgotPassword.userNotFound = Người dùng không tồn tại
auth.verifyResetOtp.success = OTP đã được xác thực
auth.verifyResetOtp.invalid = OTP không hợp lệ
auth.resetPassword.success = Mật khẩu đã được reset thành công

# OTP Messages
otp.expired = OTP đã hết hạn. Vui lòng yêu cầu một OTP mới.
otp.max_attempts_exceeded = Đã vượt quá số lần thử tối đa. Vui lòng yêu cầu một OTP mới.
otp.invalid = OTP không hợp lệ. Bạn còn {0} lần thử.
otp.rate_limit_exceeded = Quá nhiều yêu cầu. Vui lòng thử lại sau.

