spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lms
    username: root
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
#    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    redis:
      host: localhost
      port: 6379

  messages:
    basename: i18n/messages
    encoding: UTF-8

server:
  port: ${SERVER_PORT}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

otp:
  expiration-minutes: 5
  max-attempts: 5
  rate-limit-requests-per-hour: 5

springdoc:
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
    try-it-out-enabled: true
    filter: true

app:
  name: LMS System
  profile:
    avatar:
      max-size-bytes: 5242880
      allowed-content-types: image/jpeg,image/png,image/webp
