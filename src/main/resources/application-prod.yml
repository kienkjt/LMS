spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 120000
      connection-timeout: 30000
      leak-detection-threshold: 60000

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:1024MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:1024MB}

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: true

server:
  port: ${SERVER_PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:${CLOUDINARY_AVATAR_CLOUD_NAME:}}
  api-key: ${CLOUDINARY_API_KEY:${CLOUDINARY_AVATAR_API_KEY:}}
  api-secret: ${CLOUDINARY_API_SECRET:${CLOUDINARY_AVATAR_API_SECRET:}}

  accounts:
    avatar:
      cloud-name: ${CLOUDINARY_AVATAR_CLOUD_NAME:${CLOUDINARY_CLOUD_NAME:}}
      api-key: ${CLOUDINARY_AVATAR_API_KEY:${CLOUDINARY_API_KEY:}}
      api-secret: ${CLOUDINARY_AVATAR_API_SECRET:${CLOUDINARY_API_SECRET:}}
    course-image:
      cloud-name: ${CLOUDINARY_COURSE_IMAGE_CLOUD_NAME:${CLOUDINARY_AVATAR_CLOUD_NAME:${CLOUDINARY_CLOUD_NAME:}}}
      api-key: ${CLOUDINARY_COURSE_IMAGE_API_KEY:${CLOUDINARY_AVATAR_API_KEY:${CLOUDINARY_API_KEY:}}}
      api-secret: ${CLOUDINARY_COURSE_IMAGE_API_SECRET:${CLOUDINARY_AVATAR_API_SECRET:${CLOUDINARY_API_SECRET:}}}
    course-video:
      cloud-name: ${CLOUDINARY_COURSE_VIDEO_CLOUD_NAME:${CLOUDINARY_AVATAR_CLOUD_NAME:${CLOUDINARY_CLOUD_NAME:}}}
      api-key: ${CLOUDINARY_COURSE_VIDEO_API_KEY:${CLOUDINARY_AVATAR_API_KEY:${CLOUDINARY_API_KEY:}}}
      api-secret: ${CLOUDINARY_COURSE_VIDEO_API_SECRET:${CLOUDINARY_AVATAR_API_SECRET:${CLOUDINARY_API_SECRET:}}}

otp:
  expiration-minutes: 5
  max-attempts: 5
  rate-limit-requests-per-hour: 5

vnpay:
  payment-url: ${VNPAY_PAYMENT_URL}
  return-url: ${VNPAY_RETURN_URL}
  frontend-return-url: ${VNPAY_FRONTEND_RETURN_URL:http://localhost:3000/payment/result}
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  version: ${VNPAY_VERSION:2.1.0}
  command: ${VNPAY_COMMAND:pay}
  order-type: ${VNPAY_ORDER_TYPE:other}
  locale: ${VNPAY_LOCALE:vn}
  currency-code: ${VNPAY_CURRENCY:VND}
  expire-minutes: ${VNPAY_EXPIRE_MINUTES:15}

app:
  name: LMS System
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}
  profile:
    avatar:
      max-size-bytes: ${AVATAR_MAX_SIZE_BYTES:5242880}
      allowed-content-types: ${AVATAR_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
  media:
    course-image:
      max-size-bytes: ${MEDIA_COURSE_IMAGE_MAX_SIZE_BYTES:52428800}
      allowed-content-types: ${MEDIA_COURSE_IMAGE_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
    course-video:
      max-size-bytes: ${MEDIA_COURSE_VIDEO_MAX_SIZE_BYTES:5368709120}
      allowed-content-types: ${MEDIA_COURSE_VIDEO_ALLOWED_CONTENT_TYPES:video/mp4,video/mpeg,video/quicktime,video/x-msvideo,video/x-flv,video/webm}
  certificate:
    storage-dir: ${CERTIFICATE_STORAGE_DIR:certificates}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-1.5-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
  timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:60}
