spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: true

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

otp:
  expiration-minutes: 5
  max-attempts: 5
  rate-limit-requests-per-hour: 5

app:
  name: LMS System
  profile:
    avatar:
      max-size-bytes: ${AVATAR_MAX_SIZE_BYTES:5242880}
      allowed-content-types: ${AVATAR_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
