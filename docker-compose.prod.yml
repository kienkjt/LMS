services:

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--bind",
        "0.0.0.0",
        "--protected-mode",
        "no"
      ]
    volumes:
      - redis_data:/data
    networks:
      - lms-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms-backend
    restart: unless-stopped

    depends_on:
      - redis

    ports:
      - "8080:8080"

    networks:
      - lms-network

    environment:

      # Spring
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080

      # Database (Railway MySQL)
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Frontend + CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:4200,http://localhost:5173,https://lms-fe-self.vercel.app}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:3000}

      # Mail
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_FROM: ${SPRING_MAIL_FROM:-noreply@lms.com}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}

      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      CLOUDINARY_AVATAR_CLOUD_NAME: ${CLOUDINARY_AVATAR_CLOUD_NAME}
      CLOUDINARY_AVATAR_API_KEY: ${CLOUDINARY_AVATAR_API_KEY}
      CLOUDINARY_AVATAR_API_SECRET: ${CLOUDINARY_AVATAR_API_SECRET}

      CLOUDINARY_COURSE_IMAGE_CLOUD_NAME: ${CLOUDINARY_COURSE_IMAGE_CLOUD_NAME}
      CLOUDINARY_COURSE_IMAGE_API_KEY: ${CLOUDINARY_COURSE_IMAGE_API_KEY}
      CLOUDINARY_COURSE_IMAGE_API_SECRET: ${CLOUDINARY_COURSE_IMAGE_API_SECRET}

      CLOUDINARY_COURSE_VIDEO_CLOUD_NAME: ${CLOUDINARY_COURSE_VIDEO_CLOUD_NAME}
      CLOUDINARY_COURSE_VIDEO_API_KEY: ${CLOUDINARY_COURSE_VIDEO_API_KEY}
      CLOUDINARY_COURSE_VIDEO_API_SECRET: ${CLOUDINARY_COURSE_VIDEO_API_SECRET}

      # VNPay
      VNPAY_PAYMENT_URL: ${VNPAY_PAYMENT_URL}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}
      VNPAY_FRONTEND_RETURN_URL: ${VNPAY_FRONTEND_RETURN_URL}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}

      # Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS}

networks:
  lms-network:

volumes:
  redis_data:
